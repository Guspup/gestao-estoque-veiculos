# Configurações do Servidor
server.port=8080

# --- CONFIGURAÇÃO PARA H2 (PADRÃO) ---
spring.datasource.url=jdbc:h2:file:./dados/estoque_sql
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- CONFIGURAÇÃO PARA MYSQL (OPCIONAL - DESCOMENTE PARA USAR) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/estoque_veiculos?createDatabaseIfNotExist=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=sua_senha
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configurações Gerais JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuração de CORS
# (As anotações @CrossOrigin nos controllers já resolvem, mas você pode centralizar aqui se preferir)
